<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Mégane Cloud • Authentification</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Styles CSS -->
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- HEADER FIXE (hauteur 50px) -->
  <header class="header">
    <a href="index.html" class="logo-circle" aria-label="Mégane Cloud">
      <img src="assets/logo.png" alt="Logo MC">
    </a>
    <span class="site-name-3d">MÉGANE</span>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <main class="main-content">
    <!-- CARTE AUTH NÉOMORPHIQUE -->
    <div class="auth-card">
      <!-- ONGLETS -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin">Connexion</button>
        <button class="tab-btn" id="tabSignup">Inscription</button>
      </div>

      <!-- FORMULAIRE CONNEXION -->
      <form class="auth-form" id="formLogin" novalidate>
        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="loginEmail" required>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="loginPassword" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" checked> Se souvenir de moi
          </label>
          <a href="#" class="forgot-link" id="forgotPassword">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnLogin">Se connecter</button>
      </form>

      <!-- FORMULAIRE INSCRIPTION -->
      <form class="auth-form hidden" id="formSignup" novalidate>
        <!-- Prénom et Nom côte à côte -->
        <div class="form-row">
          <div class="form-group half">
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Prénom" id="signupFirstname" required>
            </div>
          </div>
          <div class="form-group half">
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Nom" id="signupLastname" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="signupEmail" required>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="signupPassword" required>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Confirmer mot de passe" id="signupConfirm" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptTerms" required> J'accepte les conditions d'utilisation
          </label>
        </div>

        <button type="submit" class="btn-submit" id="btnSignup">Créer mon compte</button>
      </form>

      <!-- MODALE RÉINITIALISATION (simulée) -->
      <div class="modal hidden" id="forgotModal">
        <div class="modal-content">
          <h3>Réinitialisation mot de passe</h3>
          <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
          <div class="form-group">
            <div class="input-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" placeholder="Votre email" id="resetEmail">
            </div>
          </div>
          <div class="modal-buttons">
            <button class="btn-modal btn-cancel" id="cancelReset">Annuler</button>
            <button class="btn-modal btn-send" id="sendReset">Envoyer</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Script JavaScript autonome -->
  <script src="js/auth.js"></script>
</body>
</html>
