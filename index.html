<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Mégane Cloud • coffre-fort numérique</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Styles CSS -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- LOADER INITIAL -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-title">MÉGANE CLOUD</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <!-- SYNC LOADER -->

    <div class="sync-loader-content">
      <i class="fas fa-circle-notch fa-spin"></i>
      <span class="sync-text">SYNC</span>
      <span class="sync-count">0/0</span>
      <span class="sync-size">0/0 Mo</span>
      <span class="sync-time"></span>
    </div>
  </div>

  <!-- DELETE LOADER -->
  <div class="delete-loader hidden" id="deleteLoader">
    <div class="delete-loader-backdrop"></div>
    <div class="delete-loader-content">
      <i class="fas fa-circle-notch fa-spin"></i>
      <div class="delete-loader-text">Suppression en cours...</div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
   <a href="index.html" class="logo-circle" aria-label="Mégane Cloud">
  <img src="assets/logo.png" 
       alt="Logo MC"
       onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'url(%23g)\'/%3E%3Cdefs%3E%3ClinearGradient id=\'g\' x1=\'0%25\' y1=\'0%25\' x2=\'100%25\' y2=\'100%25\'%3E%3Cstop offset=\'0%25\' stop-color=\'%234a90e2\'/%3E%3Cstop offset=\'100%25\' stop-color=\'%23ff7e9f\'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x=\'50\' y=\'70\' font-size=\'50\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\'%3EMC%3C/text%3E%3C/svg%3E';">
</a>

    <span class="site-name-3d">MÉGANE</span>

    <!-- Barre de recherche (par défaut) -->
    <div class="search-container" id="searchContainer">
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher...">
    </div>

    <!-- Barre multi-sélection (cachée par défaut) -->
    <div class="multi-select-actions hidden" id="multiSelectActions">
      <span class="select-count" id="selectCount">0 </span>
      <div class="select-buttons">
        <button class="action-btn" id="downloadSelectedBtn" title="Télécharger la sélection">
          <i class="fas fa-download"></i>
        </button>
        <button class="action-btn" id="deleteSelectedBtn" title="Supprimer la sélection">
          <i class="fas fa-trash"></i>
        </button>
        <button class="action-btn" id="cancelSelectBtn" title="Annuler">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Menu contextuel header -->
    <div class="context-menu-header hidden" id="headerContextMenu">
      <div class="context-menu-header-content">
        <!-- Options injectées par JS -->
      </div>
    </div>

    <!-- Boutons d'authentification -->
    <div class="auth-buttons" id="authButtons">
      <a href="auth.html?mode=login" class="btn-auth btn-auth-login">Connexion</a>
      <a href="auth.html?mode=signup" class="btn-auth btn-auth-signup">Inscription</a>
    </div>

    <!-- Bouton paramètres -->
    <a href="para.html" class="settings-btn" id="settingsBtn" aria-label="Paramètres">
      <i class="fas fa-cog"></i>
    </a>
  </header>

  <!-- STATS SCROLLABLES -->
  <div class="stats-scroll-container" id="statsContainer">
    <div class="stats-flex-row" id="statsRow">
      <!-- Stats injectées par JS -->
    </div>
  </div>

  <!-- BARRE FICHIERS RÉCENTS -->
  <div class="recent-files-bar">
    <span class="recent-files-title">Fichiers récents</span>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <main class="main-content" id="mainContent">
    <!-- Grille injectée par JS -->
  </main>

  <!-- BOUTONS FLOTTANTS -->
  <div class="fab-rectangle" id="fabContainer">
    <div class="fab fab-upload" id="uploadBtn" title="Uploader des fichiers">
      <i class="fas fa-plus"></i>
    </div>
    <a href="gestion.html" class="fab fab-gestion" title="Gestionnaire de fichiers">
      <i class="fas fa-folder-open"></i>
    </a>
  </div>

  <!-- OVERLAY DE VISUALISATION -->
  <div class="file-overlay hidden" id="fileOverlay">
    <div class="overlay-backdrop" id="overlayBackdrop"></div>
    <div class="overlay-container">
      <div class="overlay-header">
        <span class="overlay-filename" id="overlayFilename"></span>
      </div>
      <div class="overlay-content" id="overlayContent"></div>
      <div class="overlay-footer">
        <div class="overlay-metadata" id="overlayMetadata"></div>
        <div class="overlay-actions">
          <button class="overlay-action-btn" id="overlayDownload" title="Télécharger">
            <i class="fas fa-download"></i>
          </button>
          <button class="overlay-action-btn" id="overlayFavorite" title="Ajouter aux favoris">
            <i class="fas fa-star"></i>
          </button>
          <button class="overlay-action-btn" id="overlayShare" title="Partager">
            <i class="fas fa-share-alt"></i>
          </button>
          <button class="overlay-action-btn" id="overlayDelete" title="Supprimer">
            <i class="fas fa-trash"></i>
          </button>
          <button class="overlay-action-btn" id="overlayFullscreen" title="Ouvrir en plein écran">
            <i class="fas fa-expand"></i>
          </button>
          <button class="overlay-action-btn" id="overlayClose" title="Fermer">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  
      


  <!-- Script JavaScript -->
  <script src="js/app.js"></script>
  <script src="js/securite.js"></script>
  <script src="js/index.js"></script>
  <script src="js/correction.js"></script>
  <script>
  (function() {
    console.log('🔧 Patch: Copie simple avec timeout');
    
    // Récupérer les fichiers sélectionnés
    function getSelectedFileIds() {
      return Array.from(document.querySelectorAll('.file-item.selected'))
        .map(item => item.dataset.id)
        .filter(id => id);
    }
    
    function getFileById(fileId) {
      const item = document.querySelector(`.file-item[data-id="${fileId}"]`);
      if (item?.dataset.file) {
        try {
          return JSON.parse(item.dataset.file.replace(/&apos;/g, "'"));
        } catch (e) {}
      }
      return null;
    }
    
    // Gestionnaire de copie direct
    window.handleCopySelected = async function() {
      console.log('📋 Copie');
      
      const selectedIds = getSelectedFileIds();
      if (selectedIds.length === 0) {
        alert('Aucun fichier sélectionné');
        return;
      }
      
      const file = getFileById(selectedIds[0]);
      if (!file) {
        alert('Fichier introuvable');
        return;
      }
      
      // Vérifier si supabase existe
      if (!window.supabase) {
        alert('Supabase non disponible');
        return;
      }
      
      try {
        // Récupérer utilisateur
        const { data: { user } } = await window.supabase.auth.getUser();
        
        if (!user) {
          alert('Vous devez être connecté');
          return;
        }
        
        // Copier
        await window.supabase
          .from('presse_papiers')
          .delete()
          .eq('user_id', user.id);
        
        await window.supabase
          .from('presse_papiers')
          .insert({ user_id: user.id, fichier_id: file.id });
        
        alert(`✅ Copié: ${file.nom}`);
        
      } catch (error) {
        console.error('Erreur:', error);
        alert('❌ Erreur copie');
      }
    };
    
    // Patcher le bouton
    const btn = document.getElementById('copySelectedBtn');
    if (btn) {
      btn.addEventListener('click', window.handleCopySelected);
      console.log('✅ Bouton prêt');
    } else {
      console.log('⏳ Attente bouton...');
    }
    
  })();
</script>
</body>
</html>
